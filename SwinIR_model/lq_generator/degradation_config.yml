# ============================================================
# Real-ESRGAN Degradation Configuration
# 用于批量生成 LQ 图像（非训练）
# 该配置文件定义了从高质量图像（GT）到低质量图像（LQ）的退化过程，
# 模拟真实场景下的图像降质（模糊、下采样、噪声、JPEG压缩等）。
# ============================================================

# ---------------- Basic Settings ---------------- #
scale: 4                     # 下采样倍数，最终 LQ 尺寸 = GT 尺寸 / scale
device: cuda                 # 运行设备：cuda（GPU）或 cpu，推荐 cuda 加速
manual_seed: 0               # 随机种子，设为固定值可保证结果可复现
num_gpu: 1                   # 使用的 GPU 数量（当 device=cuda 时生效）

# ---------------- IO Settings ---------------- #
io:
  input_dir: datasets/GT     # 输入文件夹：存放原始高清图像（Ground Truth）
  output_dir: datasets/LQ    # 输出文件夹：生成的退化图像将保存在此处
  recursive: true            # 是否递归读取 input_dir 的子目录中的图像
  save_format: png           # 输出图像格式，常用 png（无损）或 jpg
  overwrite: true            # 若输出文件已存在，是否覆盖（true=覆盖，false=跳过）

# ---------------- USM Settings ---------------- #
# USM（Unsharp Mask）锐化，用于增强 GT 图像的高频细节。
# 仅在特定损失函数中使用锐化后的 GT 作为目标，不影响实际 LQ 生成。
usm:
  l1_gt_usm: true           # L1 损失是否使用锐化后的 GT
  percep_gt_usm: true       # 感知损失是否使用锐化后的 GT
  gan_gt_usm: false        # 对抗损失是否使用锐化后的 GT（通常不使用）

# ============================================================
# 第一阶段退化（First-order Degradation）
# 对应 Real-ESRGAN 论文中的第一阶段退化：模糊 → 下采样 → 噪声 → JPEG
# ============================================================
degradation_1:

  # 下采样/上采样/保持的概率分布 [上采样, 下采样, 保持]
  # 例如 [0.2, 0.7, 0.1] 表示 20% 概率放大，70% 概率缩小，10% 概率保持原尺寸
  resize_prob: [0.2, 0.7, 0.1]
  # 缩放因子范围，相对于原图尺寸。例如 [0.15, 1.5] 表示缩小到 15% 或放大到 150%
  resize_range: [0.6, 1.2]

  # 高斯噪声概率（0~1），1.0 表示每次必定添加高斯噪声
  gaussian_noise_prob: 1.0
  # 高斯噪声标准差范围（整数），单位：像素灰度值（0-255）
  noise_range: [1, 30]

  # 泊松噪声尺度参数范围（泊松噪声强度与图像强度成正比）
  poisson_scale_range: [0.05, 3]

  # 灰度噪声概率（0~1），将彩色噪声转为灰度噪声，1.0 表示总是转换
  gray_noise_prob: 1.0

  # JPEG 压缩质量因子范围（0~100，越低压缩越强，质量越差）
  jpeg_range: [20, 60]

# ============================================================
# 第二阶段退化（Second-order Degradation）
# 对第一阶段输出再次应用类似的退化过程，进一步增强退化程度
# ============================================================
degradation_2:

  # 第二阶段是否应用模糊（0~1），1.0 表示总是执行二次模糊
  second_blur_prob: 0.5

  # 缩放概率分布 [上采样, 下采样, 保持]
  resize_prob: [0.3, 0.4, 0.3]
  # 缩放因子范围（第二阶段通常更接近 1，以轻微调整为主）
  resize_range: [0.3, 1.2]

  # 高斯噪声概率
  gaussian_noise_prob: 1.0
  noise_range: [1, 8]       # 第二阶段噪声强度略低

  poisson_scale_range: [0.05, 0.8]

  gray_noise_prob: 0.5

  jpeg_range: [30, 95]

# ---------------- Blur Kernel Settings ---------------- #
# 模糊核参数（两个阶段共用此配置）
blur:

  # 模糊核大小（像素），应为奇数，越大则模糊效果越明显
  kernel_size: 5
  # 支持的模糊核类型列表：
  # 'iso'  - 各向同性高斯模糊（圆形对称）
  # 'aniso' - 各向异性高斯模糊（椭圆高斯）
  # 'generalized_iso' - 广义高斯模糊（beta分布）
  # 'generalized_aniso' - 广义各向异性高斯
  # 'plateau_iso' - 平台高斯
  # 'plateau_aniso' - 平台各向异性高斯
  kernel_list: ['iso', 'aniso']
  # 每种模糊核被选中的概率（需与 kernel_list 一一对应）
  kernel_prob: [0.5, 0.5]
  # sinc 模糊核（模拟振铃效应）的叠加概率
  sinc_prob: 0.05

  # 高斯核标准差 sigma 范围（像素）
  blur_sigma: [0.2, 1]
  # 广义高斯分布的 beta 参数范围（控制形状，>0）
  betag_range: [0.5, 4]
  # 平台高斯分布的 beta 参数范围
  betap_range: [1, 2]

# ---------------- Output Control ---------------- #
# 输出张量的后处理设置
output:

  # 是否将像素值裁剪到 [0,1] 范围（针对浮点张量）
  clip: true
  # 是否将输出图像归一化到 [0,1]（若为 false，则保持原始范围，如 [0,255]）
  normalize_to_01: true
  # 批处理大小（此脚本主要用于单张生成，通常保持 1）
  batch_size: 1
  # 是否使用 FP16 半精度（减少显存，但可能损失精度）
  use_fp16: false

# ---------------- Logging ---------------- #
# 日志与输出频率控制
log:

  # 每处理 print_every 张图像打印一次进度信息
  print_every: 10
  # 是否将日志保存到文件
  save_log: true
  # 日志文件保存路径
  log_path: logs/degradation_log.txt